name: Run Customer Loyalty Agent initializer

on:
  push:
    branches: ["main"]
    paths:
      - "src/app/agents/customerLoyaltyAgent_initializer.py"
      - "src/prompts/CustomerLoyaltyAgentPrompt.txt"
      - "src/app/tools/discountLogic.py"
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  run-initializer:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: "src/requirements.txt"

      - name: Install dependencies
        working-directory: src
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Azure login (AZURE_CREDENTIALS)
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Create .env from GitHub secret (do not commit)
        working-directory: src
        env:
          ENV_FILE_CONTENTS: ${{ secrets.ENV }}
        run: |
          set -euo pipefail
          # Write exactly what's stored in the secret (supports multi-line)
          printf "%s" "$ENV_FILE_CONTENTS" > .env

          # Optional: sanity check without leaking values
          test -s .env

      - name: Run initializer script
        working-directory: src
        env:
          PYTHONPATH: ${{ github.workspace }}/src
          # In case the script reads this directly:
          AZURE_CREDENTIALS: ${{ secrets.AZURE_CREDENTIALS }}
        run: |
          python -u app/agents/customerLoyaltyAgent_initializer.py

      - name: Cleanup .env
        if: always()
        working-directory: src
        run: rm -f .env
