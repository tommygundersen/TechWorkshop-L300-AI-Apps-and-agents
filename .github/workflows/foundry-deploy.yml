name: Run Customer Loyalty Agent initializer

on:
  push:
    branches: ["main"]
    paths:
      - "src/app/agents/customerLoyaltyAgent_initializer.py"
      - "src/prompts/CustomerLoyaltyAgentPrompt.txt"
      - "src/app/tools/discountLogic.py"
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  run-initializer:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: "src/requirements.txt"

      - name: Install dependencies
        working-directory: src
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # Use a service principal JSON stored as a repo secret.
      # This is the classic azure/login pattern (not OIDC).
      - name: Azure login (AZURE_CREDENTIALS)
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Run initializer script
        working-directory: src
        env:
          # Many Azure SDK samples look for these; the script can read AZURE_CREDENTIALS directly too.
          AZURE_CREDENTIALS: ${{ secrets.AZURE_CREDENTIALS }}
          PYTHONPATH: ${{ github.workspace }}/src
        run: |
          python -u app/agents/customerLoyaltyAgent_initializer.py
